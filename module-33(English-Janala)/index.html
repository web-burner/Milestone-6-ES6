<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Janala | Best Platform To Learn English</title>
    <!-- daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- tailwindcss -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- custom css -->
    <link rel="stylesheet" href="style.css">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- fav icon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Manrope:wght@200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <section class="mb-5">
        <h2 class="text-center text-4xl font-bold"><span class="text-sky-500">Let's</span> Learn Vocabularies</h2>
        <!-- buttons -->
        <div id="all-btns" class=" flex justify-center items-center gap-3 py-4">
        </div>
        <div class="flex justify-center ">
            <input id="input-text" type="text" placeholder="Type here" class="input outline-none" />
        </div>
    </section>
    <!-- spinner -->
     <div id="spinner" class="hidden">
        <div class="flex items-center justify-center p-10">
        <span class="loading loading-spinner loading-xl"></span>
     </div>
     </div>

    <section id="word-container" class="w-11/12 mx-auto grid grid-cols-4 gap-5 p-10 bg-gray-100">
        <div class="text-center col-span-4">
            <p>আপনি এখনো কোন Lesson Select করেন নি</p>
            <p class="text-4xl font-semibold">একটি Lesson Select করুন।</p>
        </div>
    </section>
   
    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="word_modal.showModal()">open modal</button> -->
    <dialog id="word_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="details-container">
                <div>
                    <p>word</p>
                </div>
                <div>
                    <p>Meaning</p>
                    <p>meaning</p>
                </div>
                <div>
                    <p>Explain:</p>
                    <p>explain</p>
                </div>
                <div>
                    <p>Synonym</p>
                    <p>synonyms</p>
                </div>
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn hover:bg-blue-800 hover:text-white">Finished Learning</button>
                </form>
            </div>
        </div>
    </dialog>



    

    <script src="script.js"></script>
</body>

</html>
